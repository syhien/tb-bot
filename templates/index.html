<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品查询 - 淘宝联盟</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body>
    <div class="container">
      <!-- 主标题 -->
      <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-brand mb-3">
          <i class="bi bi-bag-heart-fill"></i>
          商品查询
        </h1>
        <p class="text-secondary lead">快速查询淘宝商品，获取返利链接</p>
      </div>

      <!-- 搜索查询卡片 -->
      <div class="card mb-4 fade-in">
        <div class="card-body">
          <h5 class="card-title mb-3">
            <i class="bi bi-search text-brand"></i>
            通过关键词查询
          </h5>
          <form method="POST" action="/">
            <div class="mb-3">
              <label for="keyword" class="form-label fw-semibold">
                <i class="bi bi-tag-fill text-accent"></i>
                输入商品关键词
              </label>
              <input type="text" class="form-control form-control-lg" id="keyword" name="keyword" required
                     placeholder="例如：Nike 运动鞋、iPhone 15、芙丽芳丝洗面霜">
            </div>
            <div class="d-flex flex-wrap gap-2 mb-3">
              <button type="button" class="btn btn-outline-secondary" id="clearKeyword">
                <i class="bi bi-arrow-counterclockwise"></i>
                清空
              </button>
              <button type="button" class="btn btn-outline-secondary" id="pasteKeyword">
                <i class="bi bi-clipboard"></i>
                粘贴
              </button>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
              <i class="bi bi-search"></i>
              查询商品
            </button>
          </form>
        </div>
      </div>

      <!-- 页脚提示 -->
      <div class="text-center mt-4 text-secondary">
        <small>
          <i class="bi bi-info-circle"></i>
          支持完整标题搜索，智能处理比价检测与商品查询
        </small>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/custom.js') }}"></script>
    <script>
       // 添加键盘快捷键支持
       $(document).keydown(function(e) {
          // Ctrl/Cmd + Enter 提交搜索
          if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
             const keyword = $('#keyword').val().trim();
             if (keyword) {
                $('form').first().submit();
             }
          }
       });
    </script>
</body>
</html>
